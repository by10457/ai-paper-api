<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T-FastApi JWT 演示</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --line: #d8e0eb;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --success: #087443;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .layout {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 20px;
      }

      section.full {
        grid-column: 1 / -1;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #344054;
        font-size: 14px;
      }

      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        border-color: var(--primary);
        outline: 3px solid rgba(37, 99, 235, 0.16);
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: var(--primary);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        border: 1px solid var(--line);
        background: #ffffff;
        color: var(--text);
      }

      button.secondary:hover {
        background: #f8fafc;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .actions button {
        flex: 1 1 160px;
      }

      .token {
        min-height: 72px;
        overflow-wrap: anywhere;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8fafc;
        padding: 12px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .result {
        min-height: 180px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #101828;
        padding: 14px;
        color: #d1fadf;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .status {
        margin-top: 12px;
        min-height: 24px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--success);
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 1120px);
          padding: 20px 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>T-FastApi JWT 演示</h1>
        <p>注册用户后登录获取 Token，再调用受保护的用户查询和更新接口。</p>
      </header>

      <div class="layout">
        <section>
          <h2>注册</h2>
          <form id="register-form">
            <label>
              用户名
              <input name="username" value="demo_user" minlength="2" maxlength="64" required />
            </label>
            <label>
              密码
              <input name="password" value="demo123456" type="password" minlength="8" required />
            </label>
            <label>
              头像
              <input name="avatar" value="https://api.dicebear.com/8.x/initials/svg?seed=Demo" maxlength="512" />
            </label>
            <label>
              昵称
              <input name="nickname" value="演示用户" maxlength="64" />
            </label>
            <label>
              邮箱
              <input name="email" value="demo@example.com" type="email" required />
            </label>
            <button type="submit">注册用户</button>
          </form>
        </section>

        <section>
          <h2>登录</h2>
          <form id="login-form">
            <label>
              用户名
              <input name="username" value="demo_user" required />
            </label>
            <label>
              密码
              <input name="password" value="demo123456" type="password" required />
            </label>
            <button type="submit">登录并保存 Token</button>
          </form>
          <p class="status" id="login-status"></p>
        </section>

        <section>
          <h2>Token</h2>
          <div class="token" id="token-view">尚未登录</div>
          <div class="actions" style="margin-top: 12px">
            <button class="secondary" id="clear-token" type="button">清空 Token</button>
            <button id="load-me" type="button">查询当前用户</button>
          </div>
        </section>

        <section>
          <h2>更新当前用户</h2>
          <form id="update-form">
            <label>
              用户名
              <input name="username" maxlength="64" />
            </label>
            <label>
              头像
              <input name="avatar" maxlength="512" />
            </label>
            <label>
              昵称
              <input name="nickname" maxlength="64" />
            </label>
            <label>
              邮箱
              <input name="email" type="email" />
            </label>
            <button type="submit">带 Token 更新</button>
          </form>
        </section>

        <section class="full">
          <h2>接口返回</h2>
          <pre class="result" id="result">等待操作...</pre>
        </section>
      </div>
    </main>

    <script>
      const apiBase = "/api/v1";
      const tokenKey = "t_fastapi_demo_token";
      const result = document.querySelector("#result");
      const tokenView = document.querySelector("#token-view");
      const loginStatus = document.querySelector("#login-status");

      function getToken() {
        return localStorage.getItem(tokenKey) || "";
      }

      function setToken(token) {
        if (token) {
          localStorage.setItem(tokenKey, token);
        } else {
          localStorage.removeItem(tokenKey);
        }
        renderToken();
      }

      function renderToken() {
        tokenView.textContent = getToken() || "尚未登录";
      }

      function showResult(data) {
        result.textContent = JSON.stringify(data, null, 2);
      }

      function setStatus(message, ok) {
        loginStatus.textContent = message;
        loginStatus.className = ok === undefined ? "status" : `status ${ok ? "ok" : "error"}`;
      }

      function formToObject(form) {
        return Object.fromEntries(new FormData(form).entries());
      }

      async function request(path, options = {}) {
        const response = await fetch(`${apiBase}${path}`, options);
        const contentType = response.headers.get("content-type") || "";
        const body = contentType.includes("application/json") ? await response.json() : await response.text();
        if (!response.ok) {
          const message = typeof body === "object" && body.detail ? body.detail : `HTTP ${response.status}`;
          throw new Error(message);
        }
        return body;
      }

      document.querySelector("#register-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const body = formToObject(event.currentTarget);
          const data = await request("/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          showResult(data);
          setStatus("注册成功，可以登录。", true);
        } catch (error) {
          showResult({ error: error.message });
          setStatus(error.message, false);
        }
      });

      document.querySelector("#login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const body = new URLSearchParams(new FormData(event.currentTarget));
          const data = await request("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          setToken(data.data.access_token);
          showResult(data);
          setStatus("登录成功，Token 已保存。", true);
        } catch (error) {
          showResult({ error: error.message });
          setStatus(error.message, false);
        }
      });

      document.querySelector("#load-me").addEventListener("click", async () => {
        try {
          const data = await request("/users/userInfo", {
            headers: { Authorization: `Bearer ${getToken()}` },
          });
          showResult(data);
          const updateForm = document.querySelector("#update-form");
          const user = data.data || {};
          updateForm.username.value = user.username || "";
          updateForm.avatar.value = user.avatar || "";
          updateForm.nickname.value = user.nickname || "";
          updateForm.email.value = user.email || "";
          setStatus("JWT 校验通过，已读取当前用户。", true);
        } catch (error) {
          showResult({ error: error.message });
          setStatus(error.message, false);
        }
      });

      document.querySelector("#update-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        try {
          const body = formToObject(event.currentTarget);
          for (const key of Object.keys(body)) {
            if (body[key] === "") {
              delete body[key];
            }
          }
          const data = await request("/users/updateInfo", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${getToken()}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body),
          });
          showResult(data);
          setStatus("更新成功。", true);
        } catch (error) {
          showResult({ error: error.message });
          setStatus(error.message, false);
        }
      });

      document.querySelector("#clear-token").addEventListener("click", () => {
        setToken("");
        showResult({ message: "Token 已清空" });
        setStatus("Token 已清空。", true);
      });

      renderToken();
    </script>
  </body>
</html>
